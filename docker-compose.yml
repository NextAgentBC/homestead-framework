services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homestead_site}
      POSTGRES_USER: ${POSTGRES_USER:-homestead_site}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homestead_site_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homestead_site} -d ${POSTGRES_DB:-homestead_site}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    restart: unless-stopped
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-homestead_site}:${POSTGRES_PASSWORD:-homestead_site_password}@postgres:5432/${POSTGRES_DB:-homestead_site}
    # Reach the host webchat-bridge (systemd --user service on :18791) for live chat.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - media-data:/app/media      # self-hosted blog images, served at /api/media/<file>
    networks:
      default: {}
      # Cloudflare tunnel (in infra/) routes homestead-api.* -> this alias on `edge`.
      edge:
        aliases:
          - homestead-site-backend
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    networks:
      default: {}
      # Cloudflare tunnel (in infra/) routes homestead.* -> this alias on `edge`.
      edge:
        aliases:
          - homestead-site-frontend
    depends_on:
      - backend

networks:
  edge:
    external: true

volumes:
  postgres-data:
  media-data:
